[build]
  command = "npm install"
  functions = "netlify/functions"
  publish = "."

[[redirects]]
  from = "/api/news/everything"
  to = "/.netlify/functions/news-everything"
  status = 200

[[redirects]]
  from = "/api/news/top-headlines"
  to = "/.netlify/functions/news-top-headlines"
  status = 200

[[redirects]]
  from = "/api/news/fetch"
  to = "/.netlify/functions/fetch-news"
  status = 200

[[redirects]]
  from = "/api/news/rss"
  to = "/.netlify/functions/fetch-rss"
  status = 200

[[redirects]]
  from = "/api/news/esana"
  to = "/.netlify/functions/fetch-esana"
  status = 200

[[redirects]]
  from = "/api/fb/post"
  to = "/.netlify/functions/fb-post"
