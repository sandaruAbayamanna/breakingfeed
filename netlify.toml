[[redirects]]
  from = "/api/fb/video"
  to = "/.netlify/functions/fb-video"
  status = 200

[[redirects]]
  from = "/api/fb/photo"
  to = "/.netlify/functions/fb-photo"
  status = 200

[[redirects]]
  from = "/api/extract-video"
  to = "/.netlify/functions/extract-video"
